services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      DJANGO_SECRET_KEY: "change-me-in-production"
      SQLITE_PATH: "/app/data/db.sqlite3"
    volumes:
      - sqlite_data:/app/data
      - media_data:/app/media

volumes:
  sqlite_data:
  media_data:
