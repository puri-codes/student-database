<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Trebuchet MS", "Lucida Sans Unicode", "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at 20% 20%, #a7f3d0 0%, transparent 35%),
                radial-gradient(circle at 80% 10%, #fde68a 0%, transparent 35%),
                #ecfdf5;
        }

        .card {
            width: min(420px, 92vw);
            background: #ffffff;
            border: 1px solid #d6d3d1;
            border-radius: 16px;
            padding: 22px;
            box-shadow: 0 14px 28px rgba(15, 23, 42, 0.1);
        }

        h1 {
            margin: 0 0 12px;
            font-family: Georgia, "Palatino Linotype", serif;
        }

        .row {
            display: flex;
            flex-direction: column;
            margin-bottom: 12px;
            gap: 6px;
        }

        input {
            border: 1px solid #d6d3d1;
            border-radius: 8px;
            padding: 10px;
        }

        button {
            width: 100%;
            border: 0;
            border-radius: 8px;
            padding: 11px;
            background: #0d9488;
            color: white;
            font-weight: 700;
            cursor: pointer;
        }

        .errors {
            list-style: none;
            padding: 0;
            margin: 0 0 10px;
            color: #b91c1c;
        }
    </style>
</head>
<body>
    <form class="card" method="post">
        {% csrf_token %}
        <h1>Sign in</h1>

        {% if form.errors %}
            <ul class="errors">
                <li>Invalid username or password.</li>
            </ul>
        {% endif %}

        <div class="row">
            <label for="id_username">Username</label>
            <input id="id_username" name="username" type="text" required autofocus />
        </div>

        <div class="row">
            <label for="id_password">Password</label>
            <input id="id_password" name="password" type="password" required />
        </div>

        <button type="submit">Login</button>
        <input type="hidden" name="next" value="{{ next|default:'/students/' }}" />
    </form>
</body>
</html>
