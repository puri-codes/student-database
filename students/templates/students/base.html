<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Student Manager{% endblock %}</title>
    <style>
        :root {
            --ink: #112233;
            --bg: #f4efe7;
            --paper: #fffaf2;
            --accent: #0d9488;
            --accent-dark: #0f766e;
            --danger: #c53030;
            --muted: #6b7280;
            --border: #d6d3d1;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Trebuchet MS", "Lucida Sans Unicode", "Segoe UI", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 10% 0%, #fef3c7 0%, transparent 40%),
                radial-gradient(circle at 90% 20%, #ccfbf1 0%, transparent 40%),
                var(--bg);
            min-height: 100vh;
        }

        .container {
            width: min(1100px, 95vw);
            margin: 28px auto;
            background: var(--paper);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(17, 34, 51, 0.08);
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 22px;
            background: linear-gradient(120deg, #0d9488, #14b8a6);
            color: #f0fdfa;
        }

        .header h1 {
            margin: 0;
            font-family: Georgia, "Palatino Linotype", serif;
            font-size: 1.4rem;
            letter-spacing: 0.3px;
        }

        .header a {
            color: #f0fdfa;
            text-decoration: none;
            font-weight: 700;
        }

        .content {
            padding: 22px;
        }

        .messages {
            margin: 0 0 16px;
            padding: 0;
            list-style: none;
        }

        .messages li {
            padding: 10px 12px;
            border-left: 4px solid var(--accent);
            background: #ecfeff;
            margin-bottom: 10px;
            border-radius: 8px;
        }

        .btn {
            border: 0;
            border-radius: 8px;
            padding: 10px 14px;
            cursor: pointer;
            font-weight: 700;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.15s ease;
        }

        .btn:hover { transform: translateY(-1px); }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-dark); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-ghost { border: 1px solid var(--border); color: var(--ink); background: white; }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .form-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label { font-weight: 700; }

        input, select, textarea {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            font-size: 0.95rem;
            background: #fff;
        }

        .table-wrap { overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 14px;
            background: #fff;
        }

        th, td {
            text-align: left;
            padding: 10px;
            border-bottom: 1px solid #e7e5e4;
            vertical-align: middle;
        }

        th { background: #f5f5f4; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.3px; }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid var(--border);
        }

        .actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .errorlist {
            margin: 0;
            padding: 0;
            list-style: none;
            color: #b91c1c;
            font-size: 0.85rem;
        }

        .course-suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        .course-suggestion-item {
            border: 1px solid var(--border);
            border-radius: 999px;
            background: #f0fdfa;
            color: #115e59;
            padding: 6px 10px;
            cursor: pointer;
        }

        .selected-courses {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
            min-height: 34px;
            align-items: center;
        }

        .course-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 999px;
            padding: 6px 10px;
            background: #0d9488;
            color: white;
            font-size: 0.9rem;
        }

        .chip-remove {
            border: 0;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.75rem;
            background: #134e4a;
            color: white;
        }

        .no-courses {
            color: var(--muted);
            font-size: 0.9rem;
        }

        option[hidden] {
            display: none;
        }

        @media (max-width: 900px) {
            .grid { grid-template-columns: 1fr; }
            .header { flex-direction: column; gap: 8px; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Student Management Frontend</h1>
            <div>
                {% if user.is_authenticated %}
                    <span>Signed in as <strong>{{ user.username }}</strong></span>
                    <form action="{% url 'logout' %}" method="post" style="display:inline; margin-left: 12px;">
                        {% csrf_token %}
                        <button class="btn btn-ghost" type="submit">Logout</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}">Login</a>
                {% endif %}
            </div>
        </div>

        <div class="content">
            {% if messages %}
                <ul class="messages">
                    {% for message in messages %}
                        <li>{{ message }}</li>
                    {% endfor %}
                </ul>
            {% endif %}

            {% block content %}{% endblock %}
        </div>
    </div>
</body>
</html>
